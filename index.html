<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My First Web Page</title>
  <style>
    :root {
      --bg-1: #0f172a;
      --bg-2: #1e293b;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #22d3ee;
      --accent-2: #f59e0b;
      --card: rgba(15, 23, 42, 0.62);
      --border: rgba(148, 163, 184, 0.25);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(1200px 700px at 12% 0%, #0ea5e9 0%, transparent 60%),
        radial-gradient(1000px 800px at 100% 100%, #f97316 0%, transparent 58%),
        linear-gradient(145deg, var(--bg-1), var(--bg-2));
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(860px, 100%);
      border: 1px solid var(--border);
      background: var(--card);
      backdrop-filter: blur(8px);
      border-radius: 10px;
      padding: 24px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
      animation: fadeUp 700ms ease-out both;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.8rem, 4vw, 3rem);
      line-height: 1.15;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.8;
      font-size: clamp(0.98rem, 2vw, 1.08rem);
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 22px;
    }

    button {
      border: 0;
      border-radius: 8px;
      padding: 11px 16px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: transform 160ms ease, opacity 160ms ease;
    }

    .primary {
      background: var(--accent);
      color: #06202a;
      font-weight: 700;
    }

    .ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }

    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); opacity: 0.9; }

    .note {
      margin-top: 18px;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .dot {
      color: var(--accent-2);
      font-weight: 700;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>はじめての Web ページ <span class="dot">.</span></h1>
    <p>
      ここがあなたのスタート地点です。HTMLで構造を作って、CSSで見た目を整えるだけで、
      こんなふうに1ページを作れます。
    </p>
    <div class="row">
      <button class="primary" id="helloBtn">クリックしてみる</button>
      <button class="ghost" id="timeBtn">今の時刻を表示</button>
    </div>
    <p class="note" id="message">ボタンを押すとここにメッセージが出ます。</p>
  </main>

  <script>
    const message = document.getElementById("message");
    const helloBtn = document.getElementById("helloBtn");
    const timeBtn = document.getElementById("timeBtn");

    helloBtn.addEventListener("click", () => {
      message.textContent = "いい感じです。最初の一歩、完成！";
    });

    timeBtn.addEventListener("click", () => {
      const now = new Date();
      message.textContent = "現在時刻: " + now.toLocaleTimeString("ja-JP");
    });
  </script>
</body>
</html>
